appId: com.ai-video-metadata-extractor
productName: AI视频元数据提取工具
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - backend/**/*
  - node_modules/**/*
extraResources:
  - from: ffmpeg/
    to: ffmpeg/
  - from: python-embedded/
    to: python-embedded/
win:
  target: nsis
  icon: build/icon.ico
